<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Research Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Resource Library</h1>
    </header>

    <div class="game-grid">
        <div class="card" onclick="openGame('https://now.gg/apps/roblox/9301/roblox.html')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="Roblox">
            <h3>Module 1</h3>
        </div>

        <div class="card" onclick="openGame('https://geometry-dash-url.com')">
            <img src="https://upload.wikimedia.org/wikipedia/en/3/35/Geometry_Dash_Logo.PNG" alt="GD">
            <h3>Module 2</h3>
        </div>
    </div>

    <div id="player-container" style="display:none;">
        <button onclick="closeGame()">Back to Library</button>
        <iframe id="game-iframe" src="" frameborder="0"></iframe>
    </div>

    <script>
        function openGame(url) {
            document.querySelector('.game-grid').style.display = 'none';
            document.getElementById('player-container').style.display = 'block';
            document.getElementById('game-iframe').src = url;
        }

        function closeGame() {
            document.querySelector('.game-grid').style.display = 'grid';
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('game-iframe').src = '';
        }
    </script>
</body>
</html>

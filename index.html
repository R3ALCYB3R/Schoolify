<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs - Schoolify</title> 
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box" id="auth-box">
            <h2>Schoolify Access</h2>
            <p>Verification Required</p>
            <input type="password" id="passkey" placeholder="Student ID...">
            <button onclick="checkLogin()">Login</button>
        </div>

        <div class="login-box" id="quiz-box" style="display:none;">
            <h2>Security Check</h2>
            <p>Solve: 12 + 48 ÷ 6?</p> <input type="text" id="quiz-answer" placeholder="Answer...">
            <button onclick="resetLogin()">Verify</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header>
            <h1>Schoolify</h1>
            <div class="nav-tabs">
                <button onclick="showTab('library')">Web Apps</button>
                <button onclick="showTab('downloads')">Downloads</button>
            </div>
        </header>

        <main id="library" class="game-grid">
            <div class="card" onclick="openGame('https://now.gg/apps/roblox/9301/roblox.html')">
                <img src="https://img.icons8.com/color/480/roblox.png">
                <h3>Roblox (Cloud)</h3>
            </div>
            <div class="card" onclick="openGame('https://geometry-dash.io/')">
                <img src="https://upload.wikimedia.org/wikipedia/en/3/35/Geometry_Dash_Logo.PNG">
                <h3>Geometry Dash</h3>
            </div>
        </main>

        <main id="downloads" class="game-grid" style="display:none;">
            <div class="card">
                <h3>LocalJIT</h3>
                <p>Version 1.0 (.zip)</p>
                <a href="downloads/LocalJIT.zip" class="dl-btn" download>Download</a>
            </div>
            <div class="card">
                <h3>DevStore</h3>
                <p>iOS Utility (.ipa)</p>
                <a href="downloads/DevStore.ipa" class="dl-btn" download>Download</a>
            </div>
        </main>
    </div>

    <div id="player-container" style="display:none;">
        <div class="controls">
            <button class="back-btn" onclick="closeGame()">← Close</button>
            <span>Schoolify Secure Stream</span>
        </div>
        <iframe id="game-iframe" src="" allowfullscreen></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>

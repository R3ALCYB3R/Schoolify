<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title> <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico"> <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header id="main-header">
        <h1>Research Database</h1>
        <input type="text" id="searchBar" placeholder="Search modules..." onkeyup="filterGames()">
    </header>

    <main class="game-grid" id="library">
        <div class="card" onclick="openGame('https://now.gg/apps/roblox/9301/roblox.html')">
            <img src="https://img.icons8.com/color/480/roblox.png">
            <h3>Physics Engine 1.0</h3>
        </div>

        <div class="card" onclick="openGame('https://geometry-dash.io/')">
            <img src="https://upload.wikimedia.org/wikipedia/en/3/35/Geometry_Dash_Logo.PNG">
            <h3>Geometry Module</h3>
        </div>

        <div class="card" onclick="openGame('https://mcraft.pages.dev/')">
            <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png">
            <h3>Architecture Tool</h3>
        </div>

        <div class="card" onclick="openGame('https://www.xbox.com/play/games/fortnite/BT5P2X999VH2')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Fortnite_F_lettermark_logo.png">
            <h3>Strategic Planning</h3>
        </div>
    </main>

    <div id="player-container" style="display:none;">
        <div class="controls">
            <button class="back-btn" onclick="closeGame()">Back to Docs</button>
            <span id="panic-hint">Press [ESC] to Panic Redirect</span>
        </div>
        <iframe id="game-iframe" src="" allowfullscreen></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
